<header class="app-mobile-header" role="banner">
  <a class="app-mobile-header__brand" routerLink="/app/dashboard" aria-label="Dashboard">
    <i [class]="icons.Heart" class="app-mobile-header__brand-mark" aria-hidden="true"></i>
    <span class="app-mobile-header__brand-name">{{ productName() }}</span>
  </a>

  <div class="app-mobile-header__right">
    <fav-user-menu
      [displayName]="displayName() ?? ''"
      [email]="email() ?? ''"
      (signOut)="onSignOut()"
    />
  </div>
</header>
